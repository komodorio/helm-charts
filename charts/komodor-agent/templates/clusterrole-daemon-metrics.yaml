{{- if and (.Values.createRbac) (.Values.capabilities.metrics) -}}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "komodorAgent.daemonMetrics.serviceAccountName" . }}
rules:
# Base read permissions for metrics collection
- apiGroups:
  - ""
  resources:
  - configmaps
  - namespaces
  - pods
  - nodes
  - nodes/stats
  - nodes/proxy
  verbs:
  - get
  - list
# watch on pods lets the metrics daemon serve pod enrichment from an informer
# cache (kube_consolidated use_pod_informer) instead of per-pod API GETs
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  - daemonsets
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  - cronjobs
  verbs:
  - get
- apiGroups:
  - extensions
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - watch
  - list
# apiserver metrics access
- nonResourceURLs:
  - "/metrics"
  verbs:
  - get
{{- end -}}
