name: KB refresh (helm-charts)

# TWICE-DAILY batched refresh of the knowledge base. Previously this fired on every
# merge to master; now it runs on a schedule and only triggers when there have been
# commits since the last successful run. helm-charts maps to a single KB record (`helm-charts`).
# We detect changes over `kb-refresh-last..HEAD` (a lightweight marker tag this
# workflow moves to HEAD after each successful run) and, if any, trigger the KB
# pipeline with CHANGED=helm-charts so that record gets a fresh deterministic + AI refresh.
# The KB repo is updated; helm-charts is not. The KB pipeline's nightly full rebuild
# (cron "0 3 * * *") is unaffected.

on:
  schedule:
    - cron: '0 11,20 * * *'   # 11:00 & 20:00 UTC — batches all merges since the previous run
  workflow_dispatch:

permissions:
  contents: write            # to move the kb-refresh-last marker tag

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags to diff since last run)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes since last run
        id: detect
        run: |
          MARKER="kb-refresh-last"
          # Diff from the marker tag set by the previous successful run to HEAD.
          # First run / missing tag -> fall back to the last 24h of history (the
          # nightly full rebuild is the backstop for anything this bootstrap misses).
          if git rev-parse -q --verify "refs/tags/${MARKER}" >/dev/null; then
            BASE=$(git rev-list -n1 "refs/tags/${MARKER}")
          else
            BASE=$(git rev-list -n1 --before="24 hours ago" "$GITHUB_SHA" || true)
          fi
          [ -z "$BASE" ] && BASE="${GITHUB_SHA}^"
          N=$(git rev-list --count "${BASE}..${GITHUB_SHA}")
          echo "Commits since last run (${BASE}..HEAD): $N"
          if [ "$N" -gt 0 ]; then echo "changed=helm-charts" >> "$GITHUB_OUTPUT"; else echo "changed=" >> "$GITHUB_OUTPUT"; fi

      - name: Trigger knowledge-base pipeline
        if: steps.detect.outputs.changed != ''
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
          BK_ORG: komodor               # Buildkite org slug (NOT the GitHub org "komodorio")
          BK_PIPELINE: knowledge-base
        run: |
          if [ -z "$BUILDKITE_API_TOKEN" ]; then echo "BUILDKITE_API_TOKEN not set — skipping."; exit 0; fi
          resp=$(curl -sS -w $'\n%{http_code}' -X POST \
            "https://api.buildkite.com/v2/organizations/${BK_ORG}/pipelines/${BK_PIPELINE}/builds" \
            -H "Authorization: Bearer ${BUILDKITE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "commit": "HEAD",
              "branch": "master",
              "message": "KB refresh — helm-charts (scheduled batch)",
              "env": { "CHANGED": "helm-charts" }
            }')
          code=${resp##*$'\n'}; body=${resp%$'\n'*}
          echo "$body"
          if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "Triggered KB refresh (helm-charts) [HTTP $code]."
          else
            echo "::error::Buildkite trigger failed (HTTP $code): $body"; exit 1
          fi

      - name: Advance the kb-refresh-last marker
        run: |
          # Reached only when the trigger succeeded or there was nothing to refresh
          # (a failed trigger exits non-zero above and skips this, so the window is
          # retried next run). Pushing a lightweight tag — never master.
          git tag -f kb-refresh-last "$GITHUB_SHA"
          git push -f origin refs/tags/kb-refresh-last
